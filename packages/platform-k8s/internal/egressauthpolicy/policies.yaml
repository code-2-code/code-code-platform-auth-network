policies:
  - policyId: protocol.openai-compatible.api-key
    materializations:
      - materializationKey: protocol.openai-compatible.api-key
        requestReplacementRules:
          - mode: bearer
            headerName: authorization
            materialKey: api_key
            headerValuePrefix: Bearer
  - policyId: protocol.openai-responses.api-key
    materializations:
      - materializationKey: protocol.openai-responses.api-key
        requestReplacementRules:
          - mode: bearer
            headerName: authorization
            materialKey: api_key
            headerValuePrefix: Bearer
  - policyId: protocol.anthropic.api-key
    materializations:
      - materializationKey: protocol.anthropic.api-key
        requestReplacementRules:
          - mode: x-api-key
            headerName: x-api-key
            materialKey: api_key
  - policyId: protocol.gemini.api-key
    materializations:
      - materializationKey: protocol.gemini.api-key
        requestReplacementRules:
          - mode: google-api-key
            headerName: x-goog-api-key
            materialKey: api_key
  - policyId: cli.openai-oauth
    materializations:
      - materializationKey: codex.openai-oauth
        requestReplacementRules:
          - mode: bearer
            headerName: authorization
            materialKey: access_token
            headerValuePrefix: Bearer
  - policyId: cli.google-oauth
    materializations:
      - materializationKey: antigravity.google-oauth
        requestReplacementRules:
          - mode: bearer
            headerName: authorization
            materialKey: access_token
            headerValuePrefix: Bearer
      - materializationKey: gemini-cli.google-oauth
        requestReplacementRules:
          - mode: bearer
            headerName: authorization
            materialKey: access_token
            headerValuePrefix: Bearer
  - policyId: vendor.google-aistudio-session
    adapterId: google-aistudio-session
    extensionProviderName: code-code-egress-auth-session
    materializations:
      - materializationKey: vendor.google-aistudio-session
        requestReplacementRules:
          - headerName: authorization
          - headerName: cookie
          - headerName: x-goog-api-key
  - policyId: vendor.mistral-admin-session
    adapterId: mistral-admin-session
    extensionProviderName: code-code-egress-auth-session
    materializations:
      - materializationKey: vendor.mistral-admin-session
        requestReplacementRules:
          - headerName: cookie
          - headerName: x-csrftoken
  - policyId: vendor.bearer-session
    adapterId: bearer-session
    extensionProviderName: code-code-egress-auth-bearer
    materializations:
      - materializationKey: vendor.bearer-session
        requestReplacementRules:
          - mode: bearer
            headerName: authorization
            materialKey: access_token
            headerValuePrefix: Bearer
  - policyId: vendor.authjs-session-cookie
    adapterId: session-cookie
    extensionProviderName: code-code-egress-auth-session
    materializations:
      - materializationKey: vendor.authjs-session-cookie
        requestReplacementRules:
          - mode: cookie
            headerName: cookie
            template: authjs.session-token=PLACEHOLDER
            materialKey: authjs_session_token
